# Database – same as trade-flux-poly (same DB_HOST, DB_NAME, DB_USER, DB_PASSWORD)
db.host=${DB_HOST:localhost}
db.port=${DB_PORT:5432}
db.database=${DB_NAME:tradeflux}
db.user=${DB_USER:postgres}
db.password=${DB_PASSWORD:}

# Polygon RPC (optional if using subgraph+WS only)
polygon.rpc.url=${POLYGON_RPC_URL:}
# Exchange contract (OrderFilled events) – default Polymarket
polygon.contract.address=${POLYGON_CONTRACT_ADDRESS:0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E}
# When polygon_trades is empty, start from this block (RPC mode)
polygon.start.block=${POLYGON_START_BLOCK:83700000}
polygon.ingestion.intervalMs=${POLYGON_INGESTION_INTERVAL_MS:300000}
polygon.ingestion.chunkBlocks=${POLYGON_INGESTION_CHUNK_BLOCKS:2000}

# Polymarket Gamma API → polygon_markets
polymarket.gamma.api.url=${POLYMARKET_GAMMA_API_URL:https://gamma-api.polymarket.com}
# Markets sync every 10 min for websocket/subgraph (token→condition mapping)
polymarket.markets.intervalMs=${POLYMARKET_MARKETS_INTERVAL_MS:600000}

# Subgraph (history) + WebSocket (live) → polygon_trades
polymarket.subgraph.url=${POLYMARKET_SUBGRAPH_URL:https://api.goldsky.com/api/public/project_cl6mb8i9h0003e201j6li0diw/subgraphs/orderbook-subgraph/0.0.1/gn}
polymarket.ws.url=${POLYMARKET_WS_URL:wss://ws-subscriptions-clob.polymarket.com/ws/market}
polygon.subgraph.backfill.enabled=${POLYGON_SUBGRAPH_BACKFILL_ENABLED:true}
polygon.ws.live.enabled=${POLYGON_WS_LIVE_ENABLED:true}
polygon.subgraph.pageSize=${POLYGON_SUBGRAPH_PAGE_SIZE:500}
polygon.subgraph.backfill.intervalMs=${POLYGON_SUBGRAPH_BACKFILL_INTERVAL_MS:60000}
polygon.subgraph.startDate=${POLYGON_SUBGRAPH_START_DATE:2026-03-01}
polygon.subgraph.overlapSeconds=${POLYGON_SUBGRAPH_OVERLAP_SECONDS:180}
polygon.ws.recentResolvedLookbackDays=${POLYGON_WS_RECENT_RESOLVED_LOOKBACK_DAYS:2}
polygon.ws.subscriptionsRefreshIntervalMs=${POLYGON_WS_SUBSCRIPTIONS_REFRESH_INTERVAL_MS:300000}# Resolution refresh: publish eligible slugs to Rabbit every 5 min
polygon.resolution.refresh.intervalMs=${POLYGON_RESOLUTION_REFRESH_INTERVAL_MS:300000}
# Gamma API rate limit (calls/sec) for resolution refresh consumer
polygon.resolution.gamma.maxCallsPerSecond=${POLYGON_RESOLUTION_GAMMA_MAX_CALLS_PER_SECOND:50}
# Rabbit consumer prefetch (in-flight messages). Higher + rate limit = more overlap.
polygon.resolution.consumer.prefetch=${POLYGON_RESOLUTION_CONSUMER_PREFETCH:10}
